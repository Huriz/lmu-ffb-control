<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>LMU Setup Share</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #2a2a3a;
    --accent: #e30022;
    --accent2: #0088cc;
    --danger: #ff3860;
    --success: #00cc77;
    --text: #f0f0f8;
    --muted: #6a6a8a;
    --font-display: 'Orbitron', monospace;
    --font-mono: 'DM Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow-x: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(227,0,34,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(227,0,34,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow top */
  body::after {
    content: '';
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(227,0,34,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px 40px;
  }

  /* Header */
  header {
    padding: 32px 0 24px;
    text-align: center;
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .logo-main {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
    line-height: 1;
  }

  .logo-main span {
    color: var(--accent);
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.ok { background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
  .status-dot.err { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Input */
  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.08em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    appearance: none;
    text-transform: lowercase;
    text-align: center;
  }

  input[type="text"]::placeholder {
    color: var(--muted);
    font-weight: 400;
    font-size: 16px;
    text-align: center;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(227,0,34,0.08), inset 0 0 20px rgba(227,0,34,0.02);
  }

  .char-count {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
    transition: color 0.2s;
  }

  .char-count.warn { color: var(--danger); }

  /* Buttons */
  .btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 20px;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn-push {
    background: var(--accent);
    color: #ffffff;
    margin-bottom: 12px;
  }

  .btn-push:hover { background: #cc001e; }

  .btn-pull {
    background: #ffffff;
    color: var(--accent);
    border: 2px solid var(--accent);
    margin-bottom: 12px;
  }

  .btn-pull:hover { background: #ffe5e8; }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Shimmer on push button */
  .btn-push::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.4s;
  }

  .btn-push:not(:disabled):active::after,
  .btn-pull:not(:disabled):active::after {
    left: 150%;
  }

  .btn-pull::after {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.4s;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.2em;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Toast / result */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 20px;
    right: 20px;
    max-width: 440px;
    margin: 0 auto;
    padding: 18px 20px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    transform: translateY(120px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
    border: 1px solid transparent;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success {
    background: rgba(0,153,102,0.08);
    border-color: rgba(0,153,102,0.3);
    color: var(--success);
  }

  .toast.error {
    background: rgba(255,56,96,0.08);
    border-color: rgba(255,56,96,0.3);
    color: var(--danger);
  }

  .toast-id {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-top: 6px;
    word-break: break-all;
  }

  /* Loading spinner inside button */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  .btn-pull .spinner {
    border-color: rgba(255,255,255,0.3);
    border-top-color: #ffffff;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Status cards */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 28px;
  }

  .status-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .status-card-label {
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
  }

  .status-card-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-card-value {
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
  }

  /* Mode tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 12px;
    background: transparent;
    border: none;
    border-radius: 9px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .tab.active {
    background: var(--accent);
    color: #ffffff;
  }

  .tab.active-pull {
    background: #ffffff;
    color: var(--accent);
    border: 2px solid var(--accent);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Refresh button */
  .btn-refresh {
    position: absolute;
    top: 28px;
    right: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
    line-height: 1;
    transition: color 0.2s, transform 0.4s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-refresh:hover { color: var(--text); }
  .btn-refresh.spinning { animation: spin 0.6s linear; }
</style>
</head>
<body>
<div class="app">

  <header style="position:relative">
    <div class="logo-sub">Le Mans Ultimate</div>
    <div class="logo-main">SETUP <span>HUB</span></div>
    <button class="btn-refresh" onclick="refreshHealth()" title="Refresh status">↻</button>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('push')">⬆ SEND</button>
    <button class="tab" onclick="switchTab('pull')">⬇ RECEIVE</button>
  </div>

  <!-- PUSH panel -->
  <div class="tab-panel active" id="panel-push">
    <div class="input-group">
      <label class="input-label" for="pushName">Setup key</label>
      <div class="input-wrap">
        <input
          type="text"
          id="pushName"
          maxlength="10"
          placeholder="setup key here"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          oninput="onPushInput()"
        >
        <span class="char-count" id="pushCount">0/10</span>
      </div>
    </div>

    <button class="btn btn-push" id="btnPush" onclick="doPush()" disabled>
      ⬆ UPLOAD SETUP
    </button>
  </div>

  <!-- PULL panel -->
  <div class="tab-panel" id="panel-pull">
    <div class="input-group">
      <label class="input-label" for="pullName">Friend's setup key</label>
      <div class="input-wrap">
        <input
          type="text"
          id="pullName"
          maxlength="10"
          placeholder="setup key here"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          oninput="onPullInput()"
        >
        <span class="char-count" id="pullCount">0/10</span>
      </div>
    </div>

    <button class="btn btn-pull" id="btnPull" onclick="doPull()" disabled>
      ⬇ LOAD INTO LMU
    </button>
  </div>

  <!-- Status cards (shared) -->
  <div class="status-grid">
    <div class="status-card">
      <div class="status-card-label">SetupHub</div>
      <div class="status-card-row">
        <div class="status-dot" id="dotHub"></div>
        <div class="status-card-value" id="statusHub">—</div>
      </div>
    </div>
    <div class="status-card">
      <div class="status-card-label">LMU</div>
      <div class="status-card-row">
        <div class="status-dot" id="dotLmu"></div>
        <div class="status-card-value" id="statusLmu">—</div>
      </div>
    </div>
    <div class="status-card">
      <div class="status-card-label">Redis</div>
      <div class="status-card-row">
        <div class="status-dot" id="dotRedis"></div>
        <div class="status-card-value" id="statusRedis">—</div>
      </div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div id="toastMsg"></div>
  <div class="toast-id" id="toastId"></div>
</div>

<script>
  function showToast(msg, id, type) {
    const t = document.getElementById('toast')
    document.getElementById('toastMsg').textContent = msg
    document.getElementById('toastId').textContent = id || ''
    t.className = `toast ${type} show`
    clearTimeout(window._toastTimer)
    window._toastTimer = setTimeout(() => { t.className = 'toast' }, 4000)
  }

  function setLoading(btnId, loading, originalText) {
    const btn = document.getElementById(btnId)
    btn.disabled = loading
    btn.innerHTML = loading
      ? `<span class="spinner"></span> WAIT...`
      : originalText
  }

  // ── Health ───────────────────────────────────────────────────────────────────
  function setCard(name, ok) {
    document.getElementById('dot' + name).className = 'status-dot ' + (ok ? 'ok' : 'err')
    document.getElementById('status' + name).textContent = ok ? 'Connected' : 'Disconnected'
  }

  async function checkHealth() {
    try {
      const ctrl = new AbortController()
      setTimeout(() => ctrl.abort(), 1500)
      const r = await fetch('/api/health', { signal: ctrl.signal })
      const d = await r.json()
      setCard('Hub', true)
      setCard('Redis', d.redis === 'connected')
      setCard('Lmu', d.lmu === 'connected')
    } catch {
      setCard('Hub', false)
      setCard('Redis', false)
      setCard('Lmu', false)
    }
  }

  function refreshHealth() {
    const btn = document.querySelector('.btn-refresh')
    btn.classList.add('spinning')
    btn.addEventListener('animationend', () => btn.classList.remove('spinning'), { once: true })
    checkHealth()
  }

  checkHealth()
  setInterval(checkHealth, 2000)

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', i === 0 && tab === 'push')
      t.classList.toggle('active-pull', i === 1 && tab === 'pull')
    })
    document.getElementById('panel-push').classList.toggle('active', tab==='push')
    document.getElementById('panel-pull').classList.toggle('active', tab==='pull')
  }

  // ── Input handlers ───────────────────────────────────────────────────────────
  function onPushInput() {
    const val = document.getElementById('pushName').value.trim()
    const cnt = document.getElementById('pushCount')
    cnt.textContent = `${val.length}/10`
    cnt.className = val.length >= 9 ? 'char-count warn' : 'char-count'
    document.getElementById('btnPush').disabled = val.length === 0
  }

  function onPullInput() {
    const val = document.getElementById('pullName').value.trim()
    const cnt = document.getElementById('pullCount')
    cnt.textContent = `${val.length}/10`
    cnt.className = val.length >= 9 ? 'char-count warn' : 'char-count'
    document.getElementById('btnPull').disabled = val.length === 0
  }

  // ── PUSH ─────────────────────────────────────────────────────────────────────
  async function doPush() {
    const name = document.getElementById('pushName').value.trim().toLowerCase()
    if (!name) return
    if (!/^[a-z0-9]+$/.test(name)) {
      showToast('Letters and numbers only, no spaces.', '', 'error')
      return
    }

    setLoading('btnPush', true)
    try {
      const r = await fetch('/api/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionName: name })
      })
      const d = await r.json()
      if (!r.ok) {
        showToast(d.error, '', 'error')
      } else {
        showToast('✓ Setup uploaded. Tell your friend:', d.sessionId, 'success')
        document.getElementById('pushName').value = ''
        onPushInput()
      }
    } catch {
      showToast('Network error. Is the server running?', '', 'error')
    } finally {
      setLoading('btnPush', false, '⬆ UPLOAD SETUP')
      document.getElementById('btnPush').disabled = true
    }
  }

  // ── PULL ─────────────────────────────────────────────────────────────────────
  async function doPull() {
    const name = document.getElementById('pullName').value.trim().toLowerCase()
    if (!name) return

    setLoading('btnPull', true)
    try {
      const r = await fetch('/api/pull', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionName: name })
      })
      const d = await r.json()
      if (!r.ok) {
        showToast(d.error, '', 'error')
      } else {
        showToast(`✓ ${d.changed} values applied — switch tabs to see changes`, d.sessionId, 'success')
        document.getElementById('pullName').value = ''
        onPullInput()
      }
    } catch {
      showToast('Network error. Is the server running?', '', 'error')
    } finally {
      setLoading('btnPull', false, '⬇ LOAD INTO LMU')
      document.getElementById('btnPull').disabled = true
    }
  }

  // Enter key
  document.getElementById('pushName').addEventListener('keydown', e => { if (e.key==='Enter') doPush() })
  document.getElementById('pullName').addEventListener('keydown', e => { if (e.key==='Enter') doPull() })
</script>
</body>
</html>
