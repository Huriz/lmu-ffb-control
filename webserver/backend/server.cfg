# ─────────────────────────────────────────────
#  LMU Setup HUB — Configuration
#  Fill in the values below and save the file.
# ─────────────────────────────────────────────

# Port the web server listens on.
# Open http://localhost:<PORT> in your browser, or http://<your-IP>:<PORT> on your phone.
PORT=3001

# Your Upstash Redis connection URL (contains your password — keep this file private).
# Get it at upstash.com → your database → Connect → ioredis
REDIS_URL=rediss://default:YOUR_TOKEN@YOUR_HOST.upstash.io:6379

# Address of LMU's local API. Do not change unless LMU moves to a different port.
LMU_URL=http://localhost:6397

# How long a session stays available, in seconds. 3600 = 1 hour.
TTL_SECONDS=3600
